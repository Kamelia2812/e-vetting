# ── E-Vetting Email Configuration ──────────────────────────────────────────
# Update these values to match your SMTP provider.
# For Gmail: use an App Password (not your main password).
#   Generate one at: https://myaccount.google.com/apppasswords
#
# For UMT institutional mail: replace host/port/user/password accordingly.
# ────────────────────────────────────────────────────────────────────────────

mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.auth=true
mail.smtp.starttls.enable=true

# Sender credentials
mail.username=your-email@gmail.com
mail.password=your-app-password

# Display name shown in the From field
mail.from.name=E-Vetting System (UMT)
mail.from.address=your-email@gmail.com

# Set to false to disable email sending (useful during development)
mail.enabled=true
